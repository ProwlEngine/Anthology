name: Publish

# Tag a commit vX.Y.Z to release every package at that version.
# Publishes via NuGet Trusted Publishing (OIDC) - no API key secret needed.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Anthology.slnx

      - name: Build
        run: dotnet build Anthology.slnx -c Release --no-restore

      # Slang's native binaries are not committed; fetch them before testing/packing so they're
      # present for Prowl.Slang.Tests and pack into runtimes/.
      - name: Fetch Slang native binaries
        working-directory: Slang/Native
        run: dotnet run UpdateSources.cs

      # Clay is excluded (uncommitted model assets). Matching is substring-on-FullyQualifiedName
      # (the test namespace, NOT the .csproj/dll name). Prowl.Graphite.Tests is excluded here and
      # run separately below since it's the only Graphite suite with GPU-backend tests; everything
      # else (ShaderDef, ShaderDef.Compiler, Slang) has no GPU dependency and runs on this headless
      # runner as-is.
      - name: Test
        run: dotnet test Anthology.slnx -c Release --no-build --filter "FullyQualifiedName!~Prowl.Clay.Tests&FullyQualifiedName!~Prowl.Graphite.Tests"

      # Prowl.Graphite.Tests has GPU-backend suites (Vulkan/D3D11/OpenGL/OpenGLES) that need
      # hardware this runner lacks; only its CPU-only tests run here.
      - name: Test Graphite
        run: >
          dotnet test Anthology.slnx -c Release --no-build
          --filter "FullyQualifiedName~Prowl.Graphite.Tests&Backend!=Vulkan&Backend!=D3D11&Backend!=OpenGL&Backend!=OpenGLES"

      - name: Pack
        run: dotnet pack Anthology.slnx -c Release --no-build -o artifacts/nuget

      - name: NuGet auth (trusted publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: Wulferis

      - name: Push to NuGet
        run: >
          dotnet nuget push "artifacts/nuget/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
