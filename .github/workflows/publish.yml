name: Publish

# Tag a commit vX.Y.Z to release every package at that version.
# Publishes via NuGet Trusted Publishing (OIDC) - no API key secret needed.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Anthology.slnx

      - name: Build
        run: dotnet build Anthology.slnx -c Release --no-restore

      # Some suites need hardware CI lacks (they pass locally with it), so they're excluded:
      # Clay (uncommitted model assets), Slang (native binaries fetched after this step), and all
      # Graphite tests - Prowl.Graphite.Tests, Prowl.Graphite.ShaderDef.Tests and
      # Prowl.Graphite.ShaderDef.Compiler.Tests (GPU backends / Slang native on a headless runner).
      # Matching is substring-on-FullyQualifiedName (the test namespace, NOT the .csproj/dll name):
      # "Prowl.Graphite" covers every Graphite suite, and Slang's namespace is "Prowl.Slang.Test"
      # (singular) even though its project is Prowl.Slang.Tests. Everything else gates the release.
      - name: Test
        run: dotnet test Anthology.slnx -c Release --no-build --filter "FullyQualifiedName!~Prowl.Clay.Tests&FullyQualifiedName!~Prowl.Slang.Test&FullyQualifiedName!~Prowl.Graphite"

      # Slang's native binaries are not committed; fetch them so they pack into runtimes/.
      - name: Fetch Slang native binaries
        working-directory: Slang/Native
        run: dotnet run UpdateSources.cs

      - name: Pack
        run: dotnet pack Anthology.slnx -c Release --no-build -o artifacts/nuget

      - name: NuGet auth (trusted publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: Wulferis

      - name: Push to NuGet
        run: >
          dotnet nuget push "artifacts/nuget/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
